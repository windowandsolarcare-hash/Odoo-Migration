<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>WSC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:  #0f172a;
      --bg-card:  #1e293b;
      --text:     #e2e8f0;
      --text-dim: #94a3b8;
      --accent:   #38bdf8;
      --border:   #334155;
    }
    body.light {
      --bg-page: #f1f5f9;
      --bg-card: #ffffff;
      --text:    #0f172a;
      --text-dim:#475569;
      --accent:  #0284c7;
      --border:  #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    .hub-header {
      padding: 40px 24px 20px;
      text-align: center;
    }
    .hub-logo {
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
    }
    .hub-title {
      font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1.2;
    }
    .hub-date {
      font-size: 14px; color: var(--text-dim); margin-top: 6px;
    }
    .theme-toggle {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text-dim); padding: 8px;
    }

    /* ── CARDS ── */
    .hub-cards {
      flex: 1; display: flex; flex-direction: column;
      gap: 16px; padding: 16px 20px 40px;
      justify-content: center;
    }

    .hub-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      display: flex; align-items: center; gap: 20px;
      cursor: pointer;
      transition: transform .1s, border-color .1s;
      text-decoration: none; color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .hub-card:active { transform: scale(0.98); border-color: var(--accent); }

    .card-icon {
      font-size: 36px; flex-shrink: 0;
      width: 60px; height: 60px;
      background: var(--bg-page);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .card-body { flex: 1; }
    .card-title {
      font-size: 20px; font-weight: 700; color: var(--text);
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 14px; color: var(--text-dim);
    }
    .card-arrow {
      font-size: 20px; color: var(--text-dim); flex-shrink: 0;
    }

    /* ── CARD ACCENT BORDERS ── */
    .card-timeclock  { border-left: 4px solid #f59e0b; }
    .card-field      { border-left: 4px solid #38bdf8; }
    .card-reactiv    { border-left: 4px solid #a78bfa; }

    /* ── DESKTOP ── */
    @media (min-width: 600px) {
      .hub-header { padding-top: 60px; }
      .hub-cards {
        flex-direction: row; flex-wrap: wrap;
        max-width: 900px; margin: 0 auto; width: 100%;
        align-items: stretch;
      }
      .hub-card {
        flex: 1; min-width: 240px;
        flex-direction: column; text-align: center;
        padding: 36px 24px; gap: 16px;
      }
      .card-icon { width: 72px; height: 72px; font-size: 40px; margin: 0 auto; }
      .card-arrow { display: none; }
      .card-timeclock  { border-left: none; border-top: 4px solid #f59e0b; }
      .card-field      { border-left: none; border-top: 4px solid #38bdf8; }
      .card-reactiv    { border-left: none; border-top: 4px solid #a78bfa; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>

  <div class="hub-header">
    <div class="hub-logo">Window &amp; Solar Care</div>
    <div class="hub-title">Saunders Business Group</div>
    <div class="hub-date" id="hub-date"></div>
  </div>

  <div class="hub-cards">

    <a class="hub-card card-timeclock" href="/timeclock">
      <div class="card-icon">⏱</div>
      <div class="card-body">
        <div class="card-title">Time Clock</div>
        <div class="card-sub">Clock in · Clock out · Hours</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="hub-card card-field" href="/field">
      <div class="card-icon">🏠</div>
      <div class="card-body">
        <div class="card-title">Field Assistant</div>
        <div class="card-sub">Schedule · Jobs · Payments</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="hub-card card-reactiv" href="/reactivation">
      <div class="card-icon">📋</div>
      <div class="card-body">
        <div class="card-title">Reactivation Campaign</div>
        <div class="card-sub">Candidates · Preview · Launch</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

  <script>
    // Date display
    const d = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('hub-date').textContent =
      days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

    // Theme
    function toggleTheme() {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('wsc_theme', isLight ? 'light' : 'dark');
      document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
    }
    (function() {
      if (localStorage.getItem('wsc_theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('theme-btn').textContent = '🌙';
      }
    })();
  </script>
</body>
</html>
