<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>WSC Field Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
    }

    /* Access code screen */
    #access-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 16px;
    }

    #access-screen h2 { font-size: 20px; color: #38bdf8; }
    #access-screen p  { font-size: 14px; color: #64748b; }

    #access-input {
      font-size: 24px;
      padding: 12px 16px;
      width: 200px;
      text-align: center;
      border: 2px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      border-radius: 12px;
      letter-spacing: 4px;
    }

    #access-btn {
      padding: 14px 32px;
      background: #0284c7;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Main app */
    #main-screen { display: none; }

    /* Mode toggle */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mode-label { font-size: 13px; color: #94a3b8; }

    .toggle {
      position: relative;
      width: 52px;
      height: 28px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 28px;
      cursor: pointer;
      transition: .2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 4px; top: 4px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }
    input:checked + .toggle-slider { background: #0284c7; }
    input:checked + .toggle-slider:before { transform: translateX(24px); }

    .mode-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      background: #334155;
      color: #94a3b8;
    }
    .mode-badge.immediate { background: #0c4a6e; color: #38bdf8; }

    /* Input area */
    textarea {
      width: 100%;
      min-height: 110px;
      padding: 14px;
      font-size: 17px;
      line-height: 1.5;
      background: #1e293b;
      color: #f1f5f9;
      border: 2px solid #334155;
      border-radius: 14px;
      resize: none;
      outline: none;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: #0284c7; }
    textarea::placeholder { color: #475569; }

    /* Submit button */
    #submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background .15s;
    }
    #submit-btn:active { background: #0369a1; }
    #submit-btn:disabled { background: #334155; color: #64748b; cursor: default; }

    /* Response area */
    #response-area {
      margin-top: 16px;
      display: none;
    }

    .response-box {
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .response-box.pending  { background: #1c2f46; border: 2px solid #0284c7; color: #bae6fd; }
    .response-box.success  { background: #052e16; border: 2px solid #16a34a; color: #86efac; }
    .response-box.error    { background: #2d0a0a; border: 2px solid #dc2626; color: #fca5a5; }
    .response-box.info     { background: #1e1e2e; border: 2px solid #475569; color: #e2e8f0; }

    /* Confirm buttons */
    #confirm-row {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }
    #confirm-row button {
      flex: 1;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    #confirm-yes { background: #16a34a; color: white; }
    #confirm-yes:active { background: #15803d; }
    #confirm-no  { background: #dc2626; color: white; }
    #confirm-no:active  { background: #b91c1c; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Candidates list */
    .candidates {
      margin-top: 8px;
      padding-left: 16px;
      font-size: 14px;
      color: #94a3b8;
    }
    .candidates li { margin-bottom: 4px; }

    /* History */
    #history {
      margin-top: 20px;
      border-top: 1px solid #1e293b;
      padding-top: 12px;
    }
    .history-label { font-size: 11px; color: #475569; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .history-item {
      padding: 8px 12px;
      background: #1e293b;
      border-radius: 8px;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .history-item:active { background: #334155; }

    /* Clear link */
    .clear-link {
      font-size: 12px;
      color: #475569;
      text-decoration: underline;
      cursor: pointer;
      display: inline-block;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- Access code gate -->
<div id="access-screen">
  <h2>WSC Field Assistant</h2>
  <p>Enter access code to continue</p>
  <input id="access-input" type="password" inputmode="text" maxlength="20" placeholder="••••••••">
  <button id="access-btn" onclick="checkAccess()">Unlock</button>
  <p id="access-error" style="color:#dc2626;font-size:14px;display:none;">Incorrect code</p>
</div>

<!-- Main interface -->
<div id="main-screen">
  <h1>WSC Field Assistant</h1>
  <p class="subtitle">Tap mic on keyboard, speak your command</p>

  <!-- Mode toggle -->
  <div class="mode-row">
    <span class="mode-label">Mode:</span>
    <label class="toggle">
      <input type="checkbox" id="mode-toggle" onchange="updateModeLabel()">
      <span class="toggle-slider"></span>
    </label>
    <span class="mode-badge" id="mode-badge">CONFIRM</span>
  </div>

  <!-- Voice input -->
  <textarea id="voice-input" placeholder="Tap the mic on your keyboard and speak...&#10;&#10;Examples:&#10;  Update Kenneth's notes to gate code 1234&#10;  What's the status of Barbara Williams&#10;  Create a follow-up for the Smith property in 2 weeks&#10;  Add a note to P00123 says customer was not home"></textarea>

  <button id="submit-btn" onclick="handleSubmit()">Send</button>

  <!-- Response -->
  <div id="response-area">
    <div id="response-box" class="response-box info"></div>
    <div id="confirm-row">
      <button id="confirm-yes" onclick="handleConfirm(true)">Yes, Do It</button>
      <button id="confirm-no"  onclick="handleConfirm(false)">Cancel</button>
    </div>
  </div>

  <!-- History -->
  <div id="history">
    <div class="history-label">Recent commands <span class="clear-link" onclick="clearHistory()">(clear)</span></div>
    <div id="history-list"></div>
  </div>
</div>

<script>
  const BASE_URL   = '';   // same origin
  let accessCode   = '';
  let pendingAction = null;

  // Session ID — unique per browser tab, resets when tab closes
  function getSessionId() {
    let sid = sessionStorage.getItem('wsc_session');
    if (!sid) {
      sid = Math.random().toString(36).substr(2, 12);
      sessionStorage.setItem('wsc_session', sid);
    }
    return sid;
  }

  // ---- Access ----
  function checkAccess() {
    const val = document.getElementById('access-input').value.trim();
    // Minimal local check — server validates for real
    if (val.length < 4) {
      document.getElementById('access-error').style.display = 'block';
      return;
    }
    accessCode = val;
    localStorage.setItem('wsc_access', val);
    showMain();
  }

  document.getElementById('access-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkAccess();
  });

  function showMain() {
    document.getElementById('access-screen').style.display = 'none';
    document.getElementById('main-screen').style.display  = 'block';
    renderHistory();
  }

  // Auto-unlock if saved
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('wsc_access');
    if (saved) {
      accessCode = saved;
      showMain();
    }
  });

  // ---- Mode ----
  function updateModeLabel() {
    const immediate = document.getElementById('mode-toggle').checked;
    const badge = document.getElementById('mode-badge');
    badge.textContent = immediate ? 'IMMEDIATE' : 'CONFIRM';
    badge.className = 'mode-badge' + (immediate ? ' immediate' : '');
  }

  function getMode() {
    return document.getElementById('mode-toggle').checked ? 'immediate' : 'confirm';
  }

  // ---- Submit ----
  async function handleSubmit() {
    const input = document.getElementById('voice-input').value.trim();
    if (!input) return;

    setLoading(true);
    showResponse('info', '<span class="spinner"></span>Thinking...');
    hideConfirm();

    try {
      const resp = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({input, mode: getMode(), access_code: accessCode, session_id: getSessionId()})
      });
      const data = await resp.json();
      handleResponse(data, input);
    } catch (err) {
      showResponse('error', 'Network error: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  function handleResponse(data, originalInput) {
    if (data.status === 'error') {
      let msg = data.message || 'Unknown error';
      if (data.candidates && data.candidates.length > 0) {
        msg += '\n\n' + data.candidates.map((c, i) => `${i+1}. ${c}`).join('\n');
      }
      showResponse('error', msg);
      return;
    }

    if (data.status === 'done') {
      showResponse('success', data.message || 'Done.');
      addHistory(originalInput);
      document.getElementById('voice-input').value = '';
      return;
    }

    if (data.status === 'pending') {
      pendingAction = {write_action: data.write_action};
      showResponse('pending', 'Confirm action:\n\n' + data.confirmation);
      showConfirm();
      return;
    }

    showResponse('info', JSON.stringify(data, null, 2));
  }

  // ---- Confirm ----
  async function handleConfirm(confirmed) {
    hideConfirm();
    if (!confirmed) {
      showResponse('info', 'Canceled.');
      pendingAction = null;
      return;
    }

    setLoading(true);
    showResponse('info', '<span class="spinner"></span>Executing...');

    try {
      const resp = await fetch('/execute', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({...pendingAction, access_code: accessCode, session_id: getSessionId()})
      });
      const data = await resp.json();
      if (data.status === 'done') {
        showResponse('success', data.message || 'Done.');
        addHistory(document.getElementById('voice-input').value.trim());
        document.getElementById('voice-input').value = '';
      } else {
        showResponse('error', data.message || 'Error executing action.');
      }
    } catch (err) {
      showResponse('error', 'Network error: ' + err.message);
    } finally {
      setLoading(false);
      pendingAction = null;
    }
  }

  // ---- UI helpers ----
  function showResponse(type, html) {
    const area = document.getElementById('response-area');
    const box  = document.getElementById('response-box');
    area.style.display = 'block';
    box.className = 'response-box ' + type;
    box.innerHTML = html;
  }

  function showConfirm() {
    document.getElementById('confirm-row').style.display = 'flex';
  }

  function hideConfirm() {
    document.getElementById('confirm-row').style.display = 'none';
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = on;
    btn.textContent = on ? 'Thinking...' : 'Send';
  }

  // Allow Enter to submit (Shift+Enter for newline)
  document.getElementById('voice-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSubmit();
    }
  });

  // ---- History ----
  function getHistory() {
    try { return JSON.parse(localStorage.getItem('wsc_history') || '[]'); }
    catch { return []; }
  }

  function addHistory(input) {
    if (!input) return;
    let h = getHistory().filter(x => x !== input);
    h.unshift(input);
    h = h.slice(0, 8);
    localStorage.setItem('wsc_history', JSON.stringify(h));
    renderHistory();
  }

  function clearHistory() {
    localStorage.removeItem('wsc_history');
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const h = getHistory();
    if (h.length === 0) {
      list.innerHTML = '<div style="font-size:13px;color:#475569;">No recent commands</div>';
      return;
    }
    list.innerHTML = h.map(item =>
      `<div class="history-item" onclick="reuseHistory(this.textContent)">${item}</div>`
    ).join('');
  }

  function reuseHistory(text) {
    document.getElementById('voice-input').value = text;
    document.getElementById('voice-input').focus();
  }
</script>
</body>
</html>
