<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>WSC Field</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME VARIABLES ── */
    :root {
      --bg-page:     #0f172a;
      --bg-card:     #1e293b;
      --bg-input:    #0a1120;
      --bg-row-sel:  #1e293b;
      --text:        #e2e8f0;
      --text-dim:    #94a3b8;
      --text-muted:  #64748b;
      --border:      #1e293b;
      --border-row:  #263348;
      --border-sep:  #475569;
      --border-input:#334155;
      --accent:      #38bdf8;
      --accent-bg:   #0c4a6e;
      --dot-pending: #475569;
    }
    body.light {
      --bg-page:     #ffffff;
      --bg-card:     #f1f5f9;
      --bg-input:    #ffffff;
      --bg-row-sel:  #e0f2fe;
      --text:        #0f172a;
      --text-dim:    #1e293b;
      --text-muted:  #334155;
      --border:      #e2e8f0;
      --border-row:  #e2e8f0;
      --border-sep:  #94a3b8;
      --border-input:#94a3b8;
      --accent:      #0284c7;
      --accent-bg:   #e0f2fe;
      --dot-pending: #94a3b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }

    /* ── ACCESS ── */
    #access-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 16px; padding: 24px;
    }
    #access-screen h2 { font-size: 22px; color: #38bdf8; }
    #access-screen p  { font-size: 14px; color: var(--text-muted); }
    #access-input {
      font-size: 24px; padding: 12px 16px; width: 220px; text-align: center;
      border: 2px solid var(--border-input); background: var(--bg-card); color: var(--text);
      border-radius: 12px; letter-spacing: 4px; outline: none;
    }
    #access-btn {
      padding: 14px 36px; background: #0284c7; color: white;
      font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer;
    }
    #access-error { color: #dc2626; font-size: 13px; display: none; }

    /* ── APP SHELL ── */
    #app { display: none; height: 100dvh; overflow: hidden; }
    #field-panel { display: flex; flex-direction: column; height: 100dvh; background: var(--bg-page); }
    #office-panel { display: none; }

    @media (min-width: 600px) {
      #app { display: flex !important; flex-direction: row; }
      #field-panel { width: 300px; min-width: 260px; border-right: 1px solid var(--border); flex-shrink: 0; }
      #office-panel { display: flex; flex-direction: column; flex: 1; min-width: 0; background: var(--bg-card); }
    }

    /* ── FIELD HEADER ── */
    #field-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 10px; background: var(--bg-page);
      border-bottom: 2px solid var(--border-input); flex-shrink: 0;
    }
    .hdr-date  { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .hdr-total { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1.1; margin-top: 2px; }
    .hdr-count { font-size: 14px; color: var(--text-dim); margin-top: 1px; }
    .hdr-btns  { display: flex; align-items: center; gap: 2px; }
    #theme-btn, #refresh-btn {
      background: none; border: none; color: var(--text-muted); font-size: 20px;
      cursor: pointer; padding: 6px 8px; border-radius: 8px; line-height: 1;
    }
    #theme-btn:active, #refresh-btn:active { background: var(--bg-card); }

    /* ── SCHEDULE LIST ── */
    #schedule-section { flex: 1; overflow-y: auto; padding: 0; }
    .job-row {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px; cursor: pointer;
      border-bottom: 2px solid var(--border-row);
      transition: background .1s;
    }
    .job-row:active, .job-row.selected { background: var(--bg-row-sel); }
    .job-row.selected { border-left: 3px solid #0284c7; }
    .job-row.tomorrow-row { cursor: default; opacity: 0.8; }
    .job-row.tomorrow-row:active { background: transparent; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-pending    { background: var(--dot-pending); }
    .dot-active     { background: #38bdf8; animation: pulse 1.4s ease-in-out infinite; }
    .dot-inprogress { background: #f59e0b; }
    .dot-done       { background: #16a34a; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .job-time   { font-size: 13px; color: var(--text-muted); min-width: 52px; flex-shrink: 0; }
    .job-name   { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
    .job-amount { font-size: 14px; color: var(--text-dim); flex-shrink: 0; font-weight: 500; }
    .job-rate   { font-size: 11px; font-weight: 700; padding: 2px 5px; border-radius: 5px; flex-shrink: 0; margin-left: 4px; }
    .rate-green  { background: #14532d; color: #4ade80; }
    .rate-yellow { background: #713f12; color: #fbbf24; }
    .rate-red    { background: #450a0a; color: #f87171; }
    .no-jobs    { padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 14px; }

    /* Day separator header between today and tomorrow */
    .day-header-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 16px 9px;
      background: var(--bg-card);
      border-top: 4px solid var(--border-sep);
      border-bottom: 2px solid var(--border-row);
      font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
      color: var(--text);
    }
    .day-header-row .day-meta { font-size: 14px; font-weight: 600; }

    /* ── ACTIVE JOB PANEL ── */
    #active-panel {
      background: var(--bg-card); border-top: 2px solid #0284c7;
      flex-shrink: 0; max-height: 62vh; overflow-y: auto; display: none;
    }
    #active-panel.open { display: block; }
    .ap-header {
      padding: 12px 16px 6px; display: flex; align-items: flex-start; justify-content: space-between;
    }
    .ap-customer { font-size: 18px; font-weight: 700; color: var(--text); }
    .ap-so       { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .ap-close    { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0; }
    .ap-address  { padding: 2px 16px 10px; font-size: 14px; color: var(--text-dim); }

    .nav-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 0 16px 12px; padding: 13px; background: #0369a1; color: white;
      font-size: 15px; font-weight: 700; border: none; border-radius: 12px;
      cursor: pointer; width: calc(100% - 32px);
    }
    .nav-btn:active { background: #0284c7; }

    /* Task selector */
    #task-selector { padding: 0 16px 8px; }
    .section-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .task-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; background: var(--bg-input); border-radius: 8px;
      margin-bottom: 6px; cursor: pointer; border: 2px solid transparent;
    }
    .task-row.selected { border-color: #0284c7; }
    .task-name  { font-size: 14px; color: var(--text); }
    .task-stage { font-size: 12px; color: var(--text-muted); }
    .task-timer-on { font-size: 12px; color: #f59e0b; font-weight: 600; }

    /* Timer */
    #timer-section { padding: 6px 16px 12px; }
    #timer-display {
      font-size: 38px; font-weight: 700; color: var(--accent);
      text-align: center; font-variant-numeric: tabular-nums;
      letter-spacing: 2px; padding: 6px 0;
    }
    #timer-display.idle { color: var(--border-input); }
    .timer-btns { display: flex; gap: 10px; }
    .btn-start { flex: 1; padding: 14px; background: #15803d; color: white; font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; }
    .btn-start:active { background: #166534; }
    .btn-stop  { flex: 1; padding: 14px; background: #dc2626; color: white; font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; }
    .btn-stop:active  { background: #b91c1c; }
    .btn-muted { flex: 1; padding: 14px; background: var(--bg-input); color: var(--text-muted); font-size: 14px; border: none; border-radius: 12px; cursor: default; }

    /* Payment */
    #payment-section { padding: 0 16px 16px; border-top: 1px solid var(--border-input); margin-top: 4px; }
    .amount-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .dollar-sign { font-size: 22px; color: var(--text-muted); }
    .amount-input {
      flex: 1; padding: 10px 12px; font-size: 20px; font-weight: 700;
      background: var(--bg-input); color: var(--text); border: 2px solid var(--border-input);
      border-radius: 10px; outline: none;
    }
    .amount-input:focus { border-color: #0284c7; }
    .method-btns { display: flex; gap: 6px; margin-bottom: 10px; }
    .method-btn {
      flex: 1; padding: 9px 4px; background: var(--bg-input); color: var(--text-dim);
      font-size: 13px; font-weight: 600; border: 2px solid var(--border-input);
      border-radius: 8px; cursor: pointer; text-align: center;
    }
    .method-btn.sel { background: var(--accent-bg); color: var(--accent); border-color: #0284c7; }
    .method-btn:active { background: var(--bg-card); }
    .memo-input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      background: var(--bg-input); color: var(--text); border: 2px solid var(--border-input);
      border-radius: 10px; outline: none; margin-bottom: 10px; display: none;
    }
    .memo-input.show { display: block; }
    .memo-input:focus { border-color: #0284c7; }
    .pay-btn { width: 100%; padding: 14px; background: #15803d; color: white; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; }
    .pay-btn:active   { background: #166534; }
    .pay-btn:disabled { background: var(--bg-input); color: var(--text-muted); cursor: default; }

    /* Field status bar */
    #field-status { margin: 8px 16px 4px; padding: 10px 14px; font-size: 14px; border-radius: 10px; display: none; }
    #field-status.ok  { background: #052e16; color: #86efac; border: 1px solid #16a34a; }
    #field-status.err { background: #2d0a0a; color: #fca5a5; border: 1px solid #dc2626; }
    #field-status.inf { background: #1c2f46; color: #bae6fd; border: 1px solid #0284c7; }

    /* ── MIC FAB ── */
    #mic-fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 54px; height: 54px; border-radius: 50%;
      background: #0284c7; color: white; font-size: 22px;
      border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    #mic-fab:active { background: #0369a1; }
    @media (min-width: 600px) { #mic-fab { display: none; } }

    /* ── VOICE MODAL ── */
    #voice-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: flex-end; }
    #voice-modal.open { display: flex; }
    .vm-sheet { background: var(--bg-card); width: 100%; padding: 20px; border-radius: 20px 20px 0 0; max-height: 85vh; display: flex; flex-direction: column; }
    .vm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
    .vm-title  { font-size: 16px; font-weight: 700; color: var(--text); }
    .vm-close  { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    .vm-input  { width: 100%; min-height: 70px; padding: 12px; font-size: 16px; background: var(--bg-input); color: var(--text); border: 2px solid var(--border-input); border-radius: 12px; resize: none; outline: none; margin-bottom: 10px; flex-shrink: 0; }
    .vm-input:focus { border-color: #0284c7; }
    .vm-send   { width: 100%; padding: 14px; background: #0284c7; color: white; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; flex-shrink: 0; }
    .vm-send:active { background: #0369a1; }
    .vm-status { font-size: 14px; padding: 10px 12px; background: #1c2f46; border: 2px solid #0284c7; color: #bae6fd; border-radius: 10px; white-space: pre-wrap; display: none; margin-bottom: 10px; flex-shrink: 0; }
    .vm-history { overflow-y: auto; flex: 1; }
    .vmh-entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-row); }
    .vmh-entry:last-child { border-bottom: none; }
    .vmh-question { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .vmh-question::before { content: 'You: '; font-weight: 700; color: var(--text-dim); }
    .vmh-answer { font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; padding: 9px 11px; border-radius: 8px; border-left: 3px solid transparent; }
    .vmh-answer.ok  { background: #052e16; color: #86efac; border-left-color: #16a34a; }
    .vmh-answer.err { background: #2d0a0a; color: #fca5a5; border-left-color: #dc2626; }
    .vmh-answer.info { background: var(--bg-input); color: var(--text); border-left-color: var(--border-input); }

    /* ── OFFICE PANEL ── */
    #tab-bar { display: flex; background: var(--bg-page); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn {
      flex: 1; padding: 13px 4px; font-size: 11px; font-weight: 700;
      color: var(--text-muted); background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: .5px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: #0284c7; }
    .tab-btn:active { background: var(--bg-card); }
    #tab-content { flex: 1; overflow-y: auto; }
    .tab-pane { display: none; padding: 16px; }
    .tab-pane.active { display: block; }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .stat-card { background: var(--bg-card); border-radius: 12px; padding: 14px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-sub   { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .week-section { background: var(--bg-card); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .week-heading { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .week-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; font-size: 14px; color: var(--text); }
    .week-day-label { color: var(--text-dim); font-size: 13px; min-width: 30px; margin-right: 6px; }
    .week-date-num  { color: var(--text); font-weight: 500; }
    .week-amt { font-weight: 700; color: var(--accent); font-size: 14px; }
    .week-total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0 2px; border-top: 1px solid var(--border-sep); margin-top: 4px; font-size: 14px; font-weight: 600; color: var(--text); }
    .week-total-amt { font-weight: 700; color: var(--accent); font-size: 16px; }
    .forecast-section { background: var(--bg-card); border-radius: 12px; padding: 12px 14px; }
    .forecast-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; font-size: 14px; color: var(--text); }
    .forecast-label { color: var(--text-dim); font-size: 13px; }
    .forecast-amt { font-weight: 700; color: #a78bfa; font-size: 15px; }
    .forecast-mtd  { font-weight: 600; color: var(--text); font-size: 15px; }

    /* Upcoming */
    .day-group { margin-bottom: 18px; }
    .day-head  { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .upcoming-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-row); }
    .upcoming-time { font-size: 13px; color: var(--text-muted); min-width: 48px; }
    .upcoming-name { flex: 1; font-size: 14px; color: var(--text); }
    .upcoming-amt  { font-size: 13px; color: var(--text-dim); }

    /* Voice */
    #voice-textarea { width: 100%; min-height: 80px; padding: 12px; font-size: 16px; background: var(--bg-card); color: var(--text); border: 2px solid var(--border-input); border-radius: 12px; resize: none; outline: none; margin-bottom: 10px; }
    #voice-textarea:focus { border-color: #0284c7; }
    #voice-send-btn { width: 100%; padding: 13px; background: #0284c7; color: white; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 12px; }
    #voice-send-btn:disabled { background: var(--border-input); color: var(--text-muted); cursor: default; }
    #voice-status { padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; display: none; margin-bottom: 10px; }
    #voice-status.pending { background: #1c2f46; border: 2px solid #0284c7; color: #bae6fd; }
    #voice-confirm { display: none; gap: 10px; margin-bottom: 12px; }
    #voice-confirm button { flex: 1; padding: 13px; font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; }
    #vc-yes { background: #15803d; color: white; }
    #vc-no  { background: #dc2626; color: white; }
    /* Voice history */
    #voice-history { margin-top: 4px; }
    .vh-entry { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border-row); }
    .vh-entry:last-child { border-bottom: none; }
    .vh-question { font-size: 13px; color: var(--text-muted); margin-bottom: 7px; }
    .vh-question::before { content: 'You: '; font-weight: 700; color: var(--text-dim); }
    .vh-answer { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; padding: 10px 12px; border-radius: 8px; border-left: 3px solid transparent; }
    .vh-answer.ok   { background: #052e16; color: #86efac; border-left-color: #16a34a; }
    .vh-answer.err  { background: #2d0a0a; color: #fca5a5; border-left-color: #dc2626; }
    .vh-answer.info { background: var(--bg-card); color: var(--text); border-left-color: var(--border-input); }

    /* Customers */
    #cust-search { width: 100%; padding: 12px; font-size: 16px; background: var(--bg-card); color: var(--text); border: 2px solid var(--border-input); border-radius: 12px; outline: none; margin-bottom: 12px; }
    #cust-search:focus { border-color: #0284c7; }
    .cust-card { padding: 12px; background: var(--bg-card); border-radius: 10px; margin-bottom: 8px; }
    .cust-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .cust-sub  { font-size: 13px; color: var(--text-dim); margin-top: 3px; }

    /* Todos */
    .todo-card { padding: 12px; background: var(--bg-card); border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--border-input); }
    .todo-card.overdue { border-left-color: #dc2626; }
    .todo-card.today   { border-left-color: #f59e0b; }
    .todo-summary { font-size: 14px; font-weight: 600; color: var(--text); }
    .todo-meta    { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .todo-note    { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Shared */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.25); border-top-color: #38bdf8; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-msg  { padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .empty-msg { padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>

<div id="access-screen">
  <h2>WSC Field</h2>
  <p>Enter access code</p>
  <input id="access-input" type="password" inputmode="text" maxlength="20" placeholder="••••">
  <button id="access-btn" onclick="checkAccess()">Unlock</button>
  <p id="access-error">Incorrect code</p>
</div>

<div id="app">

  <!-- FIELD PANEL (cover / left column) -->
  <div id="field-panel">
    <div id="field-header">
      <div>
        <div class="hdr-date"  id="hdr-date">—</div>
        <div class="hdr-total" id="hdr-total">—</div>
        <div class="hdr-count" id="hdr-count"></div>
      </div>
      <div class="hdr-btns">
        <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">☀️</button>
        <button id="refresh-btn" onclick="loadField()">↺</button>
      </div>
    </div>

    <div id="schedule-section">
      <div class="load-msg"><span class="spinner"></span> Loading…</div>
    </div>

    <div id="active-panel">
      <div id="field-status"></div>
      <div class="ap-header">
        <div>
          <div class="ap-customer" id="ap-customer">—</div>
          <div class="ap-so"       id="ap-so"></div>
        </div>
        <button class="ap-close" onclick="closeActive()">✕</button>
      </div>
      <div class="ap-address" id="ap-address"></div>
      <button class="nav-btn" onclick="openNav()">🧭 Navigate</button>

      <div id="task-selector" style="display:none">
        <div style="padding:0 16px 6px">
          <div class="section-label">Task</div>
          <div id="task-list"></div>
        </div>
      </div>

      <div id="timer-section">
        <div id="timer-display" class="idle">00:00:00</div>
        <div class="timer-btns" id="timer-btns">
          <button class="btn-muted" disabled>Select a task above</button>
        </div>
      </div>

      <div id="payment-section">
        <div style="padding:10px 0 8px" class="section-label">Record Payment</div>
        <div class="amount-row">
          <span class="dollar-sign">$</span>
          <input type="number" class="amount-input" id="pay-amount" placeholder="0" inputmode="decimal">
        </div>
        <div class="method-btns">
          <button class="method-btn sel" data-m="check"  onclick="pickMethod(this)">Check</button>
          <button class="method-btn"     data-m="cash"   onclick="pickMethod(this)">Cash</button>
          <button class="method-btn"     data-m="zelle"  onclick="pickMethod(this)">Zelle</button>
          <button class="method-btn"     data-m="venmo"  onclick="pickMethod(this)">Venmo</button>
          <button class="method-btn"     data-m="credit" onclick="pickMethod(this)">Credit</button>
        </div>
        <input type="text" class="memo-input show" id="pay-memo" placeholder="Check #">
        <button class="pay-btn" id="pay-btn" onclick="doPayment()">Record Payment</button>
      </div>
    </div>
  </div>

  <!-- OFFICE PANEL (inner / right column) -->
  <div id="office-panel">
    <div id="tab-bar">
      <button class="tab-btn active" data-tab="stats"     onclick="showTab('stats')">Stats</button>
      <button class="tab-btn"        data-tab="upcoming"  onclick="showTab('upcoming')">7-Day</button>
      <button class="tab-btn"        data-tab="voice"     onclick="showTab('voice')">Voice</button>
      <button class="tab-btn"        data-tab="customers" onclick="showTab('customers')">Customers</button>
      <button class="tab-btn"        data-tab="todos"     onclick="showTab('todos')">To-Dos</button>
    </div>
    <div id="tab-content">
      <div id="pane-stats"     class="tab-pane active"><div class="load-msg">Loading…</div></div>
      <div id="pane-upcoming"  class="tab-pane"><div class="load-msg">Loading…</div></div>
      <div id="pane-voice"     class="tab-pane">
        <textarea id="voice-textarea" placeholder="Type a command…&#10;&#10;e.g. 'Update Michael gate code 1234'&#10;     'Status of Barbara Williams'"></textarea>
        <button id="voice-send-btn" onclick="voiceSend()">Send</button>
        <div id="voice-status"></div>
        <div id="voice-confirm">
          <button id="vc-yes" onclick="voiceConfirm(true)">Yes, Do It</button>
          <button id="vc-no"  onclick="voiceConfirm(false)">Cancel</button>
        </div>
        <div id="voice-history"></div>
      </div>
      <div id="pane-customers" class="tab-pane">
        <input type="text" id="cust-search" placeholder="Search by name…" oninput="custSearch(this.value)">
        <div id="cust-results"><div class="empty-msg">Type to search</div></div>
      </div>
      <div id="pane-todos"     class="tab-pane"><div class="load-msg">Loading…</div></div>
    </div>
  </div>

</div>

<button id="mic-fab" onclick="openVoiceModal()">🎤</button>

<div id="voice-modal">
  <div class="vm-sheet">
    <div class="vm-header">
      <span class="vm-title">Voice Command</span>
      <button class="vm-close" onclick="closeVoiceModal()">✕</button>
    </div>
    <textarea class="vm-input" id="vm-input" placeholder="Type or speak…"></textarea>
    <button class="vm-send" onclick="vmSend()">Send</button>
    <div class="vm-status" id="vm-status"></div>
    <div class="vm-history" id="vm-history"></div>
  </div>
</div>

<script>
let AC = '', jobs = [], activeJob = null, activeTask = null;
let tickInterval = null, tickStart = null;
let payMethod = 'check', pendingVoice = null, activeTab = 'stats';
let futureDays = [];  // next work days with jobs for display in main panel

function sid() {
  let s = sessionStorage.getItem('wsc_s');
  if (!s) { s = Math.random().toString(36).slice(2,14); sessionStorage.setItem('wsc_s',s); }
  return s;
}

// ── THEME ──
function applyTheme(mode) {
  if (mode === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    document.body.classList.remove('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}
function toggleTheme() {
  const isLight = document.body.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  localStorage.setItem('wsc_theme', next);
  applyTheme(next);
}

// ── ACCESS ──
function checkAccess() {
  const v = document.getElementById('access-input').value.trim();
  if (v.length < 4) { document.getElementById('access-error').style.display='block'; return; }
  AC = v; localStorage.setItem('wsc_ac', v); boot();
}
document.getElementById('access-input').addEventListener('keydown', e => { if(e.key==='Enter') checkAccess(); });

function boot() {
  const savedTheme = localStorage.getItem('wsc_theme') || 'dark';
  applyTheme(savedTheme);
  document.getElementById('access-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = window.innerWidth >= 600 ? 'flex' : 'block';
  loadField();
  if (window.innerWidth >= 600) loadTab('stats');
  setInterval(loadField, 5*60*1000);
}

window.addEventListener('resize', () => {
  if (!AC) return;
  const app = document.getElementById('app');
  if (app.style.display === 'none') return;
  app.style.display = window.innerWidth >= 600 ? 'flex' : 'block';
});

window.addEventListener('load', () => {
  const savedTheme = localStorage.getItem('wsc_theme') || 'dark';
  applyTheme(savedTheme);
  const saved = localStorage.getItem('wsc_ac');
  if (saved) { AC = saved; boot(); }
});

// ── FIELD DATA ──
async function loadField() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('hdr-date').textContent = dateStr + ' (Today)';

  const sec = document.getElementById('schedule-section');
  sec.innerHTML = '<div class="load-msg"><span class="spinner"></span> Loading…</div>';

  let data, upcomingData;
  try {
    [data, upcomingData] = await Promise.all([
      fetch(`/api/dashboard?access_code=${encodeURIComponent(AC)}`).then(r => { if(!r.ok) throw new Error('auth'); return r.json(); }),
      fetch(`/api/upcoming?access_code=${encodeURIComponent(AC)}`).then(r => r.json()).catch(() => ({days:[]}))
    ]);
  } catch {
    sec.innerHTML = '<div class="no-jobs">Failed to load — tap ↺</div>'; return;
  }

  jobs = (data.schedule && data.schedule.jobs) || [];
  const total = (data.schedule && data.schedule.total) || 0;
  const count = (data.schedule && data.schedule.count) || 0;
  document.getElementById('hdr-total').textContent = '$' + Math.round(total).toLocaleString();
  document.getElementById('hdr-count').textContent = count + (count===1?' job':' jobs') + ' today';

  // Find next 3 work days (Mon–Fri) with jobs, skipping today
  futureDays = [];
  const todayISO = [now.getFullYear(), String(now.getMonth()+1).padStart(2,'0'), String(now.getDate()).padStart(2,'0')].join('-');
  for (const day of (upcomingData.days || [])) {
    if (day.date === todayISO) continue;
    const dow = new Date(day.date + 'T12:00:00').getDay();
    if (dow === 0 || dow === 6) continue;
    if (day.jobs && day.jobs.length) {
      futureDays.push(day);
      if (futureDays.length >= 3) break;
    }
  }

  renderSchedule();
  if (activeJob) { const fresh = jobs.find(j=>j.so_id===activeJob.so_id); if(fresh) openJob(fresh,false); }
  if (activeTab==='stats' && window.innerWidth>=600) renderStats(data);
}

function renderSchedule() {
  const sec = document.getElementById('schedule-section');
  let html = '';

  if (!jobs.length) {
    html = '<div class="no-jobs">No jobs today</div>';
  } else {
    html = jobs.map((j,i) => {
      const timerOn = (j.tasks||[]).some(t=>t.timer_running);
      const dot = timerOn ? 'dot-active'
                : (j.status||'').toLowerCase().includes('done') ? 'dot-done'
                : (j.status||'').toLowerCase().includes('progress') ? 'dot-inprogress' : 'dot-pending';
      const sel = (activeJob && activeJob.so_id===j.so_id) ? ' selected' : '';

      // $/hr: only show when job is Done (green dot) — mid-job hours are misleading
      let rateBadge = '';
      if (dot === 'dot-done' && (j.amount||0) > 0) {
        let totalHrs = 0;
        for (const t of (j.tasks||[])) {
          totalHrs += (t.effective_hours||0);
        }
        if (totalHrs > 0) {
          const rate = Math.round((j.amount||0) / totalHrs);
          const cls = rate >= 190 ? 'rate-green' : rate >= 160 ? 'rate-yellow' : 'rate-red';
          rateBadge = `<span class="job-rate ${cls}">$${rate}/hr</span>`;
        }
      }

      return `<div class="job-row${sel}" onclick="openJob(jobs[${i}])">
        <span class="status-dot ${dot}"></span>
        <span class="job-time">${toPT(j.time_utc)}</span>
        <span class="job-name">${esc(j.customer)}</span>
        <span class="job-amount">$${Math.round(j.amount||0)}</span>
        ${rateBadge}
      </div>`;
    }).join('');
  }

  // Future days (read-only, up to 2)
  for (const fd of futureDays) {
    html += `<div class="day-header-row">
      <span>${esc(fd.label)}</span>
      <span class="day-meta"><span style="color:var(--accent)">$${Math.round(fd.total||0).toLocaleString()}</span> · ${fd.jobs.length} job${fd.jobs.length===1?'':'s'}</span>
    </div>`;
    html += fd.jobs.map(j => `<div class="job-row tomorrow-row">
      <span class="status-dot dot-pending"></span>
      <span class="job-time">${toPT(j.time_utc)}</span>
      <span class="job-name">${esc(j.customer)}</span>
      <span class="job-amount">$${Math.round(j.amount||0)}</span>
    </div>`).join('');
  }

  sec.innerHTML = html;
}

// ── JOB SELECTION ──
function openJob(job, scroll=true) {
  activeJob = job; stopTick(); activeTask = null;
  document.querySelectorAll('.job-row').forEach((r,i) =>
    r.classList.toggle('selected', !!(jobs[i] && jobs[i].so_id===job.so_id)));
  document.getElementById('ap-customer').textContent = job.customer;
  document.getElementById('ap-so').textContent = job.so_name || '';
  document.getElementById('ap-address').textContent = job.address || '';

  const tasks = job.tasks || [];
  // For timer selector: exclude Done tasks (stage 19 / 'Done')
  const activeTasks = tasks.filter(t => (t.stage||'').toLowerCase() !== 'done');
  const taskSel = document.getElementById('task-selector');
  const taskList = document.getElementById('task-list');
  if (!activeTasks.length) {
    taskSel.style.display = 'none'; renderTimerBtns('none');
  } else if (activeTasks.length === 1) {
    taskSel.style.display = 'none'; pickTask(activeTasks[0]);
  } else {
    taskSel.style.display = 'block';
    taskList.innerHTML = activeTasks.map((t,i) =>
      `<div class="task-row" onclick="pickTaskByIdx(${i},this)">
        <div><div class="task-name">${esc(t.task_name)}</div>
             <div class="task-stage">${esc(t.stage||'')}</div></div>
        ${t.timer_running?'<span class="task-timer-on">⏱ Running</span>':''}
      </div>`).join('');
    const ri = activeTasks.findIndex(t=>t.timer_running);
    if (ri>=0) {
      taskList.querySelectorAll('.task-row')[ri].classList.add('selected');
      pickTask(activeTasks[ri]);
    } else { renderTimerBtns('none'); }
  }

  if (job.amount) document.getElementById('pay-amount').value = Math.round(job.amount);
  hideStatus();
  document.getElementById('active-panel').classList.add('open');
  if (scroll) document.getElementById('active-panel').scrollIntoView({behavior:'smooth'});
}

function closeActive() {
  activeJob=null; activeTask=null; stopTick();
  document.getElementById('active-panel').classList.remove('open');
  document.querySelectorAll('.job-row').forEach(r=>r.classList.remove('selected'));
}

function pickTaskByIdx(idx, el) {
  document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');
  // idx is into activeTasks (non-Done only)
  const activeTasks = (activeJob.tasks||[]).filter(t=>(t.stage||'').toLowerCase()!=='done');
  pickTask(activeTasks[idx]);
}

function pickTask(task) {
  activeTask = task;
  if (task.timer_running) {
    const start = task.timer_start
      ? new Date(task.timer_start.replace(' ','T')+'Z')
      : new Date();
    startTick(start); renderTimerBtns('running');
  } else { stopTick(); renderTimerBtns('idle'); }
}

// ── NAV ──
function openNav() {
  if (!activeJob || !activeJob.address) { showStatus('err','No address on file'); return; }
  window.open('https://maps.google.com/maps?daddr='+encodeURIComponent(activeJob.address)+'&dirflg=d','_blank');
}

// ── TIMER ──
function renderTimerBtns(state) {
  const disp = document.getElementById('timer-display');
  const btns = document.getElementById('timer-btns');
  if (state==='running') {
    disp.className='';
    btns.innerHTML='<button class="btn-stop" onclick="doStopTimer()">⏹ Stop Timer</button>';
  } else if (state==='idle') {
    disp.className='idle';
    btns.innerHTML='<button class="btn-start" onclick="doStartTimer()">▶ Start Timer</button>';
  } else {
    disp.className='idle'; disp.textContent='00:00:00';
    btns.innerHTML='<button class="btn-muted" disabled>No task available</button>';
  }
}

function startTick(startDate) {
  stopTick(); tickStart = startDate;
  tickInterval = setInterval(()=>{
    const e = Math.floor((Date.now()-tickStart)/1000);
    document.getElementById('timer-display').textContent =
      pad(Math.floor(e/3600))+':'+pad(Math.floor((e%3600)/60))+':'+pad(e%60);
  },1000);
}
function stopTick() {
  if(tickInterval){clearInterval(tickInterval);tickInterval=null;}
  tickStart=null;
  document.getElementById('timer-display').textContent='00:00:00';
}
function pad(n){return String(n).padStart(2,'0');}

function getGPS() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { resolve({}); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat: pos.coords.latitude, lon: pos.coords.longitude}),
      ()  => resolve({}),
      {timeout: 5000, maximumAge: 30000}
    );
  });
}

async function doStartTimer() {
  if(!activeTask) return;
  showStatus('inf','Starting timer…');
  try {
    const gps = await getGPS();
    const r = await fetch('/api/timer/start',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({access_code:AC,task_id:activeTask.task_id, ...gps})});
    const d = await r.json();
    if(d.status==='ok'){
      activeTask.timer_running=true; startTick(new Date()); renderTimerBtns('running');
      renderSchedule(); showStatus('ok','▶ Timer running');
    } else { showStatus('err',d.message||'Failed'); }
  } catch { showStatus('err','Network error'); }
}

async function doStopTimer() {
  if(!activeTask) return;
  showStatus('inf','Stopping timer…');
  try {
    const gps = await getGPS();
    const r = await fetch('/api/timer/stop',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({access_code:AC,task_id:activeTask.task_id, ...gps})});
    const d = await r.json();
    if(d.status==='ok'){
      activeTask.timer_running=false; stopTick(); renderTimerBtns('idle');
      renderSchedule(); showStatus('ok',d.message||'⏹ Stopped — time logged');
      setTimeout(()=>document.getElementById('payment-section').scrollIntoView({behavior:'smooth'}),400);
    } else { showStatus('err',d.message||'Failed'); }
  } catch { showStatus('err','Network error'); }
}

// ── PAYMENT ──
function pickMethod(btn) {
  document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); payMethod=btn.dataset.m;
  const memo=document.getElementById('pay-memo');
  if(payMethod==='cash'){memo.classList.remove('show');}
  else if(payMethod==='check'){memo.classList.add('show');memo.placeholder='Check #';}
  else{memo.classList.add('show');memo.placeholder=payMethod.charAt(0).toUpperCase()+payMethod.slice(1)+' ref # (optional)';}
}

async function doPayment() {
  if(!activeJob) return;
  const amount=parseFloat(document.getElementById('pay-amount').value);
  if(!amount||amount<=0){showStatus('err','Enter a valid amount');return;}
  const memo=document.getElementById('pay-memo').value.trim()||payMethod;
  const btn=document.getElementById('pay-btn');
  btn.disabled=true; btn.textContent='Processing…'; showStatus('inf','Recording payment…');
  try {
    const r=await fetch('/api/payment',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({access_code:AC,so_id:activeJob.so_id,amount,payment_method:payMethod,memo})});
    const d=await r.json();
    if(d.status==='ok'){
      showStatus('ok','✅ '+d.message); btn.textContent='✅ Paid';
      setTimeout(()=>{loadField();closeActive();},2000);
    } else { showStatus('err',d.message||'Failed'); btn.disabled=false; btn.textContent='Record Payment'; }
  } catch { showStatus('err','Network error'); btn.disabled=false; btn.textContent='Record Payment'; }
}

function showStatus(type,msg){const el=document.getElementById('field-status');el.className=type;el.textContent=msg;el.style.display='block';}
function hideStatus(){document.getElementById('field-status').style.display='none';}

// ── TABS ──
function showTab(name) {
  activeTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  loadTab(name);
}
function loadTab(name) {
  if(name==='stats')    loadStats();
  if(name==='upcoming') loadUpcoming();
  if(name==='todos')    loadTodos();
}

async function loadStats() {
  const pane=document.getElementById('pane-stats');
  pane.innerHTML='<div class="load-msg"><span class="spinner"></span> Loading…</div>';
  try { renderStats(await(await fetch(`/api/dashboard?access_code=${encodeURIComponent(AC)}`)).json()); }
  catch { pane.innerHTML='<div class="empty-msg">Failed to load</div>'; }
}

function renderStats(data) {
  const pane=document.getElementById('pane-stats');
  const s=data.schedule||{}, j=s.jobs||[];
  const done=j.filter(x=>(x.status||'').toLowerCase().includes('done')).length;
  const ws=data.week_sales||'';
  const md=data.month_data||{};
  const avg=s.count?Math.round((s.total||0)/s.count):0;

  // Parse week range label: "Week of 2026-04-13 – 2026-04-18"
  let weekLabel = 'This Week (Mon–Fri)';
  const wRange = ws.match(/Week of (\d{4}-\d{2}-\d{2})[^0-9]+(\d{4}-\d{2}-\d{2})/);
  if (wRange) {
    try {
      const fmt = d => new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      weekLabel = fmt(wRange[1]) + ' – ' + fmt(wRange[2]);
    } catch {}
  }

  // Parse by-day: "2026-04-14: $120, 2026-04-15: $200" — Mon–Fri only, amount inline
  let dayRows = '';
  let weekTotal = 0;
  let weekCount = 0;
  const byDayMatch = ws.match(/By day:\s*(.+)$/);
  if (byDayMatch) {
    const DAYS = ['Mon','Tue','Wed','Thu','Fri'];
    const entries = byDayMatch[1].split(', ');
    dayRows = entries.map(e => {
      const m = e.match(/(\d{4}-\d{2}-\d{2}):\s*\$?([\d,.]+)/);
      if (!m) return '';
      try {
        const dt = new Date(m[1]+'T12:00:00');
        const dow = dt.getDay(); // 0=Sun,6=Sat
        if (dow === 0 || dow === 6) return '';
        const dayName = DAYS[dow-1];
        const dateNum = dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        const amt = Math.round(parseFloat(m[2].replace(/,/g,'')));
        weekTotal += amt;
        weekCount++;
        return `<div class="week-row"><span><span class="week-day-label">${dayName}</span><span class="week-date-num">${dateNum}</span></span><span class="week-amt">$${amt.toLocaleString()}</span></div>`;
      } catch { return ''; }
    }).filter(Boolean).join('');
  }

  // Week total row
  const weekTotalRow = weekTotal > 0
    ? `<div class="week-total-row"><span>Week Total</span><span class="week-total-amt">$${weekTotal.toLocaleString()}</span></div>`
    : '';

  // Month forecast block
  let forecastHtml = '';
  if (md.forecast) {
    const mtd   = (md.mtd||0).toLocaleString();
    const fcst  = (md.forecast||0).toLocaleString();
    const label = md.month_label || 'This Month';
    const sub   = md.forecast_count ? `${md.forecast_count} jobs scheduled` : '';
    forecastHtml = `<div class="forecast-section">
      <div class="week-heading">${label}</div>
      <div class="forecast-row"><span class="forecast-label">Done (M–F)</span><span class="forecast-mtd">$${mtd}</span></div>
      <div class="forecast-row"><span class="forecast-label">Total Scheduled</span><span class="forecast-amt">$${fcst}</span></div>
      ${sub ? `<div class="forecast-row"><span class="forecast-label" style="font-size:11px">${sub}</span><span></span></div>` : ''}
    </div>`;
  }

  pane.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Today</div>
        <div class="stat-value">$${Math.round(s.total||0).toLocaleString()}</div>
        <div class="stat-sub">${s.count||0} job${s.count===1?'':'s'}</div></div>
      <div class="stat-card"><div class="stat-label">Done Today</div>
        <div class="stat-value">${done}</div>
        <div class="stat-sub">${j.length-done} remaining</div></div>
      <div class="stat-card"><div class="stat-label">Avg Job</div>
        <div class="stat-value">${avg?'$'+avg.toLocaleString():'—'}</div>
        <div class="stat-sub">today</div></div>
    </div>
    ${dayRows ? `<div class="week-section">
      <div class="week-heading">${weekLabel}</div>
      ${dayRows}
      ${weekTotalRow}
    </div>` : ''}
    ${forecastHtml}`;
}

async function loadUpcoming() {
  const pane=document.getElementById('pane-upcoming');
  pane.innerHTML='<div class="load-msg"><span class="spinner"></span> Loading…</div>';
  try {
    const d=await(await fetch(`/api/upcoming?access_code=${encodeURIComponent(AC)}`)).json();
    if(!d.days||!d.days.length){pane.innerHTML='<div class="empty-msg">No upcoming jobs</div>';return;}
    pane.innerHTML=d.days.map(day=>`
      <div class="day-group">
        <div class="day-head"><span>${esc(day.label)}</span>
          <span>$${Math.round(day.total||0).toLocaleString()} · ${day.jobs.length} job${day.jobs.length===1?'':'s'}</span></div>
        ${day.jobs.map(j=>`<div class="upcoming-row">
          <span class="upcoming-time">${toPT(j.time_utc)}</span>
          <span class="upcoming-name">${esc(j.customer)}</span>
          <span class="upcoming-amt">$${Math.round(j.amount||0)}</span>
        </div>`).join('')}
      </div>`).join('');
  } catch { pane.innerHTML='<div class="empty-msg">Failed to load</div>'; }
}

async function loadTodos() {
  const pane=document.getElementById('pane-todos');
  pane.innerHTML='<div class="load-msg"><span class="spinner"></span> Loading…</div>';
  try {
    const d=await(await fetch(`/api/todos?access_code=${encodeURIComponent(AC)}`)).json();
    if(!d.todos||!d.todos.length){pane.innerHTML='<div class="empty-msg">No to-dos</div>';return;}
    const today=new Date().toISOString().slice(0,10);
    pane.innerHTML=d.todos.map(t=>{
      const cls=!t.date?'':t.date<today?'overdue':t.date===today?'today':'';
      const dl=t.date?(t.date<today?'⚠ Overdue · ':'')+t.date:'';
      return`<div class="todo-card ${cls}">
        <div class="todo-summary">${esc(t.summary||t.type||'To-Do')}</div>
        <div class="todo-meta">${esc(t.record)}${dl?' · '+dl:''}</div>
        ${t.note?`<div class="todo-note">${esc(t.note)}</div>`:''}
      </div>`;
    }).join('');
  } catch { pane.innerHTML='<div class="empty-msg">Failed to load</div>'; }
}

let custTimer=null;
function custSearch(q) {
  clearTimeout(custTimer);
  const res=document.getElementById('cust-results');
  if(!q||q.length<2){res.innerHTML='<div class="empty-msg">Type to search</div>';return;}
  res.innerHTML='<div class="load-msg"><span class="spinner"></span> Searching…</div>';
  custTimer=setTimeout(async()=>{
    try {
      const d=await(await fetch(`/api/search?q=${encodeURIComponent(q)}&access_code=${encodeURIComponent(AC)}`)).json();
      if(!d.results||!d.results.length){res.innerHTML='<div class="empty-msg">No results</div>';return;}
      res.innerHTML=d.results.map(c=>{
        const addr=[c.street,c.city].filter(Boolean).join(', ');
        const parts = [];
        if (c.next_job) parts.push('Next: ' + esc(c.next_job));
        if (c.last_job) parts.push('Last: ' + esc(c.last_job));
        const schedule = parts.join(' — ');
        return`<div class="cust-card"><div class="cust-name">${esc(c.name)}</div>
          <div class="cust-sub">${esc(addr)}${schedule?' — '+schedule:''}</div></div>`;
      }).join('');
    } catch { res.innerHTML='<div class="empty-msg">Search failed</div>'; }
  },400);
}

// ── VOICE (inner) ──
let currentQ = '';

async function voiceSend() {
  const input=document.getElementById('voice-textarea').value.trim();
  if(!input) return;
  currentQ = input;
  document.getElementById('voice-textarea').value = '';  // clear immediately
  const btn=document.getElementById('voice-send-btn');
  btn.disabled=true; btn.textContent='Thinking…';
  setVS('pending','⏳ Thinking…');
  document.getElementById('voice-confirm').style.display='none';
  try {
    const d=await(await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({input,mode:'confirm',access_code:AC,session_id:sid()})})).json();
    handleVR(d);
  } catch(e){addHistory(currentQ,'err','Network error: '+e.message);hideVS();}
  finally{btn.disabled=false;btn.textContent='Send';}
}
function handleVR(d) {
  if(d.status==='error'){addHistory(currentQ,'err',d.message||'Error');hideVS();}
  else if(d.status==='done'){addHistory(currentQ,'ok',d.message||'Done.');hideVS();}
  else if(d.status==='pending'){
    pendingVoice={write_action:d.write_action};
    setVS('pending','Confirm:\n\n'+d.confirmation);
    document.getElementById('voice-confirm').style.display='flex';
  } else {addHistory(currentQ,'info',JSON.stringify(d,null,2));hideVS();}
}
async function voiceConfirm(yes) {
  document.getElementById('voice-confirm').style.display='none';
  if(!yes){addHistory(currentQ,'info','Canceled.');hideVS();pendingVoice=null;return;}
  setVS('pending','⏳ Executing…');
  try {
    const d=await(await fetch('/execute',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...pendingVoice,access_code:AC,session_id:sid()})})).json();
    addHistory(currentQ, d.status==='done'?'ok':'err', d.message||(d.status==='done'?'Done.':'Error.'));
    hideVS();
  } catch(e){addHistory(currentQ,'err','Network error: '+e.message);hideVS();}
  pendingVoice=null;
}
function addHistory(question, type, msg) {
  const hist=document.getElementById('voice-history');
  const el=document.createElement('div');
  el.className='vh-entry';
  el.innerHTML=`<div class="vh-question">${esc(question)}</div><div class="vh-answer ${type}">${esc(msg)}</div>`;
  hist.appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}
function setVS(type,msg){const el=document.getElementById('voice-status');el.className=type;el.textContent=msg;el.style.display='block';}
function hideVS(){document.getElementById('voice-status').style.display='none';}
document.getElementById('voice-textarea').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();voiceSend();}});

// ── VOICE MODAL ──
function openVoiceModal(){document.getElementById('voice-modal').classList.add('open');document.getElementById('vm-input').focus();}
function closeVoiceModal(){
  document.getElementById('voice-modal').classList.remove('open');
  document.getElementById('vm-status').style.display='none';
  document.getElementById('vm-input').value='';
  // history intentionally kept so you can reopen and scroll back
}
async function vmSend() {
  const input=document.getElementById('vm-input').value.trim();
  if(!input) return;
  const vmQ=input;
  document.getElementById('vm-input').value='';  // clear immediately
  const st=document.getElementById('vm-status');
  st.textContent='⏳ Thinking…'; st.style.display='block';
  try {
    const d=await(await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({input:vmQ,mode:'immediate',access_code:AC,session_id:sid()})})).json();
    st.style.display='none';
    addVmHistory(vmQ, d.status==='error'?'err':'ok', d.message||JSON.stringify(d));
  } catch(e){
    st.style.display='none';
    addVmHistory(vmQ,'err','Error: '+e.message);
  }
}
function addVmHistory(question, type, msg) {
  const hist=document.getElementById('vm-history');
  const el=document.createElement('div');
  el.className='vmh-entry';
  el.innerHTML=`<div class="vmh-question">${esc(question)}</div><div class="vmh-answer ${type}">${esc(msg)}</div>`;
  hist.appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}
document.getElementById('vm-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();vmSend();}});

// ── HELPERS ──
function toPT(hhmm) {
  if(!hhmm||hhmm==='?') return '?';
  try {
    const[h,m]=hhmm.split(':').map(Number);
    const d=new Date(); d.setUTCHours(h,m,0,0);
    return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/Los_Angeles'});
  } catch{return hhmm;}
}
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
